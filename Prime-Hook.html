<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prime Hook UI</title>

<style>
body{
    margin:0;
    background:#000;
    font-family:Arial,sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
}

.container{
    width:380px;
    background:#070713;
    border:3px solid #00e5ff;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 0 25px #00e5ff;
}

.banner img{
    width:100%;
    display:block;
}

.title{
    text-align:center;
    color:#fff;
    font-size:20px;
    font-weight:bold;
    padding:15px;
}

.feature{
    margin:12px 18px;
    padding:18px;
    border-left:5px solid #00e5ff;
    border-radius:12px;
    color:white;
    font-size:18px;
    background:linear-gradient(to right,#083f49,#061120);
}

.feature-box{
    display:none;
}

.arrow{
    text-align:center;
    color:white;
    font-size:35px;
    cursor:pointer;
    margin:10px 0;
    user-select:none;
    transition:0.3s;
}

.buttons{
    display:flex;
    gap:10px;
    padding:15px;
}

.btn{
    flex:1;
    text-align:center;
    color:white;
    padding:15px;
    border-radius:10px;
    text-decoration:none;
    font-weight:bold;
}

.blue{
    border:2px solid #00e5ff;
}

.red{
    border:2px solid #ff4a4a;
}

.purchase{
    margin:15px;
    text-align:center;
    background:linear-gradient(90deg,#6a8cff,#9f68ff);
    color:white;
    padding:18px;
    border-radius:18px;
    font-size:20px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="container">

    <div class="banner">
        <img src="your-image.jpg" alt="">
    </div>

    <div class="title">
        PRIME HOOK FF NONROOT ANDROID
    </div>

    <!-- Always Visible -->
    <div class="feature">⚡ Aim Magnet</div>
    <div class="feature">⚡ Silent Aim</div>
    <div class="feature">⚡ Aimbot</div>

    <!-- Toggle Button -->
    <div class="arrow" id="arrow" onclick="toggleMenu()">⌄</div>

    <!-- Hidden Features -->
    <div class="feature-box" id="featureBox">
        <div class="feature">⚡ Headshot</div>
        <div class="feature">⚡ No Recoil</div>
        <div class="feature">⚡ Magic Bullet</div>
        <div class="feature">⚡ Fast Switch</div>
        <div class="feature">⚡ Auto Fire</div>
        <div class="feature">⚡ Wall Check</div>
    </div>

    <div class="buttons">
        <a href="#" class="btn blue">CHECK UPDATE FILE</a>
        <a href="#" class="btn red">CHECK VIDEO / FEEDBACK</a>
    </div>

    <div class="purchase">
        PURCHASE KEY
    </div>

</div>

<script>
function toggleMenu() {
    const featureBox = document.getElementById("featureBox");
    const arrow = document.getElementById("arrow");

    if (featureBox.style.display === "block") {

        featureBox.style.display = "none";
        arrow.innerHTML = "⌄";

        featureBox.parentNode.insertBefore(
            arrow,
            featureBox
        );

    } else {

        featureBox.style.display = "block";
        arrow.innerHTML = "⌃";

        featureBox.parentNode.insertBefore(
            arrow,
            featureBox.nextSibling
        );
    }
}
</script>

</body>
</html>
